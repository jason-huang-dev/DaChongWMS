services:
  backend:
    command: gunicorn dachong_wms.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-3} --timeout ${GUNICORN_TIMEOUT:-120}
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      DJANGO_TEST_SYSTEM_ENABLED: ${DJANGO_TEST_SYSTEM_ENABLED:-false}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-UTC}
      DATABASE_URL: ${DATABASE_URL}
      DB_SSL_REQUIRED: ${DB_SSL_REQUIRED:-false}
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_ENABLE_TEST_SYSTEM: ${VITE_ENABLE_TEST_SYSTEM:-false}
    ports:
      - "80:80"
    restart: unless-stopped

  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    restart: unless-stopped
