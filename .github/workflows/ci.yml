name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run focused frontend tests
        run: npm run test:run -- src/shared/utils/permissions.test.ts src/app/layout/app-shell.test.tsx src/features/auth/controller/useAuthController.test.tsx

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run focused backend tests
        env:
          TEST_DATABASE_URL: sqlite:////tmp/dachongwms-test.sqlite3
        run: python backend/manage.py test apps.accounts.tests.test_api_compat apps.iam.tests.test_permissions --settings=config.settings.test
